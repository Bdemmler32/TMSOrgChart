<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMS Staff Organization Chart</title>
  <meta name="description" content="TMS Staff Organization Chart and Directory — The Minerals, Metals &amp; Materials Society" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- SheetJS for reading Excel data file -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Page body (no sticky bar) ───────────────────────── -->
  <main class="main-content">

    <!-- Page header row (inside body, not sticky) -->
    <div class="page-header-row">
      <div class="page-header-left">
        <span class="tms-wordmark">TMS</span>
        <h1 class="page-title">Staff Organization Chart <span class="version-badge version-text">v0.08</span></h1>
      </div>
      <div class="page-header-right">
        <span class="page-meta" id="meta-date"></span>
        <button class="btn-export" id="btn-export-pdf">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export PDF
        </button>
      </div>
    </div>

    <!-- Search + view toggles row (sticky) -->
    <div class="controls-sticky">
      <div class="controls-inner">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="staff-search" placeholder="Search name, title, email, ext…" aria-label="Search staff" />
        </div>
        <div class="view-toggles" role="group" aria-label="View mode">
          <button class="view-btn active" id="btn-org-view">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="4" rx="1"/><rect x="2" y="18" width="6" height="4" rx="1"/><rect x="16" y="18" width="6" height="4" rx="1"/><line x1="12" y1="6" x2="12" y2="13"/><path d="M5 13h14"/><line x1="5" y1="13" x2="5" y2="18"/><line x1="19" y1="13" x2="19" y2="18"/></svg>
            Org Chart
          </button>
          <button class="view-btn" id="btn-dir-view">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Directory
          </button>
        </div>
      </div>
    </div>

    <!-- Org Chart View -->
    <section id="org-view" aria-label="Organization Chart">
      <div class="no-results">Loading staff data…</div>
    </section>

    <!-- Directory View -->
    <section id="directory-view" aria-label="Staff Directory" style="display:none;"></section>

  </main>

  <!-- ── Modal ──────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Staff profile">
    <div id="modal" class="modal"></div>
  </div>

  <!-- ── Lightbox ───────────────────────────────────────── -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo enlarged">
    <img id="lightbox-img" src="" alt="" />
    <div id="lightbox-name" class="lightbox-name"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
